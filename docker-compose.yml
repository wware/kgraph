services:
  api:
    build:
      context: .
      dockerfile: kgserver/Dockerfile
    stdin_open: true
    tty: true
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/kgserver
      BUNDLE_PATH: /bundle
      MCP_SSE_URL: ${MCP_SSE_URL:-http://mcpserver:8001/sse}
      LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
    volumes:
      - ./bundle:/bundle:ro
    #  # - /home/wware/S.zip:/bundle/S.zip:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - kgserver-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    profiles: ["api"]

  # MCP server: can take 30–60s to start on small droplets (heavy Python imports: Strawberry, SQLAlchemy, storage)
  # Shares bundle volume with api so get_paper_source and get_mentions can read sources/ and mentions.jsonl
  mcpserver:
    build:
      context: .
      dockerfile: kgserver/Dockerfile
    command: ["python", "-m", "uvicorn", "mcp_main:app", "--host", "0.0.0.0", "--port", "8001"]
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/kgserver
      BUNDLE_PATH: /bundle
      # Pass 1 (ingest worker) uses LLM; pass through same keys as api
      PASS1_LLM_BACKEND: ${PASS1_LLM_BACKEND:-anthropic}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      REDIS_URL: redis://redis:6379
    volumes:
      - ./bundle:/bundle:ro
      - ingest_workspace:/app/ingest_workspace
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - kgserver-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    profiles: ["api"]

  gwchat:
    build:
      context: ./gwchat
      args:
        NEXT_PUBLIC_BASE_PATH: /chat
    environment:
      MCP_SSE_URL: http://mcpserver:8001/sse
      LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ORCHESTRATOR_MODEL: ${ORCHESTRATOR_MODEL:-claude-haiku-4-5-20251001}
      SYNTHESIS_MODEL: ${SYNTHESIS_MODEL:-claude-sonnet-4-6}
      GWCHAT_CONFIG: /app/config/medlit.yaml
      MCP_CONNECT_TIMEOUT: "25"
      LLM_MIN_REQUEST_INTERVAL_SECONDS: "3.0"
    volumes:
      - ./gwchat/config:/app/config:ro
    ports:
      - "3000:3000"
    depends_on:
      mcpserver:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - kgserver-network
    profiles: ["api"]

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ~/ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "/bin/ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - kgserver-network
    # CPU-only configuration - no GPU required
    # Models will be pulled on first use or manually via:
    # docker exec -it med-lit-ollama ollama pull nomic-embed-text
    profiles: ["ollama"]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - kgserver-network
    profiles: ["api"]

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}  # set in .env (never commit .env)
      POSTGRES_DB: kgserver
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kgserver"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - kgserver-network
    profiles: ["api", "storage"]

  # postgres with host port exposed for local ingest scripts (run-ingest-new.sh).
  # Never use this profile on a public-facing server.
  postgres-local:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}  # set in .env (never commit .env)
      POSTGRES_DB: kgserver
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kgserver"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:5432:5432"
    restart: unless-stopped
    networks:
      - kgserver-network
    profiles: ["local"]

volumes:
  pgdata:
    driver: local
  ingest_workspace:
    driver: local

networks:
  kgserver-network:
    driver: bridge
