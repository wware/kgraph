# Entity type taxonomy for medlit extraction.
# Key: normalized (lowercase, no spaces). Value: bundle_class (PascalCase) and description.
# Pipeline loads at runtime. Domain experts edit this file.
types:
  disease:
    bundle_class: Disease
    description: "Diseases, conditions, syndromes. Use the most specific term."
  gene:
    bundle_class: Gene
    description: "Genes by symbol or name. Prefer HGNC symbol when known."
  drug:
    bundle_class: Drug
    description: "Drugs, compounds, therapeutic agents."
  protein:
    bundle_class: Protein
    description: "Structural or signaling proteins NOT better classified as Enzyme, Hormone, Receptor, or Antibody."
  hormone:
    bundle_class: Hormone
    description: "Peptide or steroid hormones (e.g. ACTH, cortisol, catecholamines)."
  enzyme:
    bundle_class: Enzyme
    description: "Proteins with catalytic function (e.g. aldosterone synthase, kinases)."
  biomarker:
    bundle_class: Biomarker
    description: "Measurable indicators of biological state. NOT pathways, drugs, cell types, or clinical outcomes like survival."
  symptom:
    bundle_class: Symptom
    description: "Symptoms, signs, clinical manifestations."
  procedure:
    bundle_class: Procedure
    description: "Medical procedures, diagnostic tests, interventions."
  mutation:
    bundle_class: Mutation
    description: "Genetic mutations, variants."
  pathway:
    bundle_class: Pathway
    description: "Biological pathways (e.g. STING pathway)."
  biologicalprocess:
    bundle_class: BiologicalProcess
    description: "Biological processes or phenomena (e.g. homologous recombination, genomic instability)."
  anatomicalstructure:
    bundle_class: AnatomicalStructure
    description: "Anatomical structures, cell types (e.g. CD8+ T cells)."
  clinicaltrial:
    bundle_class: ClinicalTrial
    description: "Clinical trials, studies."
  institution:
    bundle_class: Institution
    description: "Institutions, organizations."
  author:
    bundle_class: Author
    description: "Authors."
  studydesign:
    bundle_class: StudyDesign
    description: "Study design elements, clinical outcomes (e.g. disease-free survival)."
  statisticalmethod:
    bundle_class: StatisticalMethod
    description: "Statistical methods."
  adverseevent:
    bundle_class: AdverseEvent
    description: "Adverse events."
  hypothesis:
    bundle_class: Hypothesis
    description: "Hypotheses."
