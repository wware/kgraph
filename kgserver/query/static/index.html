<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Graph Visualization</title>
    <script>
        (function() {
            try {
                var saved = localStorage.getItem('vite-ui-theme') || 'system';
                var isLight = saved === 'system'
                    ? !window.matchMedia('(prefers-color-scheme: dark)').matches
                    : saved === 'light';
                var root = document.documentElement;
                root.classList.remove('theme-dark', 'theme-light');
                root.classList.add(isLight ? 'theme-light' : 'theme-dark');
            } catch (e) {}
        })();
    </script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link rel="stylesheet" href="graph-viz.css?v=theme-toggle">
</head>
<body>
    <div id="app">
        <div id="controls">
            <h2>Graph Controls</h2>
            
            <div class="control-group">
                <label for="entity-search">Search by name:</label>
                <div class="search-container">
                    <input type="text" id="entity-search" placeholder="e.g., breast cancer" autocomplete="off">
                    <div id="search-results" class="search-results hidden"></div>
                </div>
            </div>
            
            <div class="control-group">
                <label for="center-id">Or enter Entity ID:</label>
                <input type="text" id="center-id" placeholder="e.g., UMLS:C0006826">
            </div>
            
            <div class="control-group">
                <label for="hops">Hops: <span id="hops-value">2</span></label>
                <input type="range" id="hops" min="1" max="5" value="2">
            </div>
            
            <div class="control-group">
                <label for="max-nodes">Max Nodes: <span id="max-nodes-value">500</span></label>
                <input type="range" id="max-nodes" min="10" max="1000" value="500" step="10">
            </div>
            
            <div class="control-group">
                <label>
                    <input type="checkbox" id="include-all">
                    Show entire graph
                </label>
            </div>
            
            <div class="control-group">
                <button id="load-graph" class="btn-primary">Load Graph</button>
                <button id="reset-view" class="btn-secondary">Reset View</button>
            </div>
            <div class="control-group">
                <label for="theme-select">Theme</label>
                <select id="theme-select">
                    <option value="light">Light</option>
                    <option value="dark">Dark</option>
                    <option value="system">System</option>
                </select>
            </div>
            <script>
                (function() {
                    var sel = document.getElementById('theme-select');
                    if (!sel) return;
                    var STORAGE_KEY = 'vite-ui-theme';
                    function resolveTheme(val) {
                        if (val === 'system') {
                            return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
                        }
                        return val || 'dark';
                    }
                    function applyTheme(val) {
                        var isLight = resolveTheme(val) === 'light';
                        var root = document.documentElement;
                        root.classList.remove('theme-dark', 'theme-light');
                        root.classList.add(isLight ? 'theme-light' : 'theme-dark');
                    }
                    function saveTheme(val) {
                        try { localStorage.setItem(STORAGE_KEY, val); } catch(e) {}
                    }
                    sel.addEventListener('change', function() {
                        var val = sel.value;
                        applyTheme(val);
                        saveTheme(val);
                    });
                    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function() {
                        if (sel.value === 'system') applyTheme('system');
                    });
                    var saved = null;
                    try { saved = localStorage.getItem(STORAGE_KEY) || 'system'; } catch(e) { saved = 'system'; }
                    sel.value = saved;
                    applyTheme(saved);
                })();
            </script>
            <p class="zoom-hint">Zoom in and out with your mouse wheel.</p>
            
            <div id="graph-stats" class="stats">
                <p>Nodes: <span id="node-count">0</span></p>
                <p>Edges: <span id="edge-count">0</span></p>
                <p>Total entities: <span id="total-entities">0</span></p>
                <p>Total relationships: <span id="total-relationships">0</span></p>
                <p id="truncated-warning" class="warning hidden">Graph truncated due to size limits</p>
            </div>
        </div>
        
        <div id="graph-container">
            <svg id="graph-svg"></svg>
            <div id="graph-legend" class="graph-legend"><!-- Populated by initLegend() from ENTITY_TYPE_COLORS --></div>
        </div>
        
        <div id="detail-panel" class="hidden">
            <button id="close-panel" class="close-btn">&times;</button>
            <h3 id="panel-title">Details</h3>
            <div id="panel-content"></div>
        </div>
    </div>
    <div id="tooltip" class="hidden"></div>
    
    <script src="graph-viz.js?v=theme-toggle"></script>
</body>
</html>
