# cat /etc/nginx/sites-enabled/kgraph
server {
    server_name graphwright.io www.graphwright.io;
    # server_name 104.131.171.175;

    # Increase client body size for file uploads
    client_max_body_size 100M;

    # Let's Encrypt ACME challenge — must come BEFORE the catch-all location /
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # MCP server (SSE) – required for Cursor/Claude Code
    location /mcp/ {
        proxy_pass http://localhost:8001/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    location /sse {
        proxy_pass http://127.0.0.1:8001/sse;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE requires these — buffering kills the stream
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }

    # MCP: messages endpoint (client POSTs here; must go to mcpserver, not API)
    location /messages/ {
        proxy_pass http://127.0.0.1:8001/messages/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 300s;
    }

    # gwchat — Next.js chat UI (built with NEXT_PUBLIC_BASE_PATH=/chat)
    location /chat {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # Main API
    location / {
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts for long-running requests
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/graphwright.io/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/graphwright.io/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}
server {
    listen 80 default_server;
    server_name _;
    return 301 https://graphwright.io$request_uri;
}
server {
    if ($host = www.graphwright.io) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = graphwright.io) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name graphwright.io www.graphwright.io;
    return 404; # managed by Certbot
}
